name: MediSync Orchestrator CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Pull the code from your repo
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Set up the Java 21 environment
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      # 3. Build the project
      # -B runs in non-interactive (Batch) mode (cleaner logs)
      # we skip tests for the first run to ensure the build pipeline is solid
      - name: Build with Maven
        run: mvn -B package -DskipTests --file pom.xml

      # 4. Upload the JAR so you can download it from GitHub if needed
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: notification-service-snapshot
          path: target/*.jar
