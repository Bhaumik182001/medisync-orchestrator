name: Cross-Platform Build and Push

on:
  push:
    branches: ["main"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Pull down the source code from the repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Set up Java JDK 21 with automatic Maven dependency caching
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"

      # 3. Set up QEMU (Enables ARM64 virtualization on the AMD64 runner)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 4. Initialize Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 5. Securely authenticate with Docker Hub using repository secrets
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # 6. Build both architectures simultaneously and push to Docker Hub
      - name: Build and Push Multi-Arch Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: bhaumik182001/medisync-orchestrator:local
